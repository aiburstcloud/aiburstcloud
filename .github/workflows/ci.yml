name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install .

      - name: Verify CLI entry point
        run: aiburstcloud --version

      - name: Verify import
        run: python -c "from app.router import app; print('FastAPI app loaded')"

      - name: Check syntax (all Python files)
        run: python -m py_compile app/router.py && python -m py_compile app/cli.py && python -m py_compile app/__main__.py

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run repo audit
        run: bash scripts/audit.sh

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t aiburstcloud:test .
